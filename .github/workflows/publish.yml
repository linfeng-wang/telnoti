name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for OIDC trusted publishing

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flit
        run: pip install flit

      - name: Check version matches release tag
        run: |
          PKG_VERSION=$(python -c "import telnoti; print(telnoti.__version__)")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Version mismatch: __version__=$PKG_VERSION but tag=$GITHUB_REF_NAME"
            exit 1
          fi
          echo "Publishing version $PKG_VERSION"

      - name: Build and publish
        run: flit publish
        env:
          FLIT_INDEX_URL: https://upload.pypi.org/legacy/
